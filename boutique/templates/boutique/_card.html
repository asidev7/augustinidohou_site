<article class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl overflow-hidden hover:-translate-y-1 hover:border-blue-500/50 hover:shadow-xl hover:shadow-blue-500/10 transition-all group">
  <!-- Image -->
  <div class="h-44 bg-slate-100 dark:bg-slate-800 relative overflow-hidden">
    {% if p.image %}
      <img src="{{ p.image.url }}" alt="{{ p.nom }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-5xl text-blue-600 dark:text-blue-400">
        {% if p.type_produit == 'livre' %}
        <svg viewBox="0 0 64 64" class="w-16 h-16 drop-shadow-[0_8px_18px_rgba(37,99,235,.28)]" fill="none" aria-hidden="true">
          <path d="M14 18.5C14 15.46 16.46 13 19.5 13H47a3 3 0 0 1 3 3v31a4 4 0 0 0-4-4H19.5A5.5 5.5 0 0 0 14 48.5v-30Z" fill="url(#bookFill)"/>
          <path d="M18 18h24" stroke="#EFF6FF" stroke-width="3" stroke-linecap="round"/>
          <path d="M18 26h20" stroke="#BFDBFE" stroke-width="3" stroke-linecap="round"/>
          <path d="M18 34h15" stroke="#93C5FD" stroke-width="3" stroke-linecap="round"/>
          <path d="M50 16v32a4 4 0 0 1-4 4H19.5A5.5 5.5 0 0 1 14 46.5" stroke="#1D4ED8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="bookFill" x1="14" y1="13" x2="50" y2="52" gradientUnits="userSpaceOnUse">
              <stop stop-color="#60A5FA"/>
              <stop offset="1" stop-color="#1D4ED8"/>
            </linearGradient>
          </defs>
        </svg>
        {% elif p.type_produit == 'coaching' %}
        <svg viewBox="0 0 64 64" class="w-16 h-16 drop-shadow-[0_8px_18px_rgba(14,165,233,.26)]" fill="none" aria-hidden="true">
          <circle cx="32" cy="20" r="10" fill="#38BDF8"/>
          <path d="M20 50c1.2-8.24 6.41-14 12-14s10.8 5.76 12 14" stroke="#0F172A" stroke-width="3.2" stroke-linecap="round"/>
          <path d="m45 18 4 4 7-8" stroke="#0EA5E9" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 50h40" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" opacity=".4"/>
        </svg>
        {% else %}
        <svg viewBox="0 0 64 64" class="w-16 h-16 drop-shadow-[0_8px_18px_rgba(59,130,246,.24)]" fill="none" aria-hidden="true">
          <rect x="17" y="17" width="30" height="30" rx="9" fill="url(#gearBg)"/>
          <path d="M32 24v-6M32 46v-6M24 32h-6M46 32h-6M25.8 25.8l-4.2-4.2M42.4 42.4l-4.2-4.2M38.2 25.8l4.2-4.2M21.6 42.4l4.2-4.2" stroke="#DBEAFE" stroke-width="3" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="7.5" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="3"/>
          <defs>
            <linearGradient id="gearBg" x1="17" y1="17" x2="47" y2="47" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1E40AF"/>
              <stop offset="1" stop-color="#60A5FA"/>
            </linearGradient>
          </defs>
        </svg>
        {% endif %}
      </div>
    {% endif %}
    {% if p.en_vedette %}
    <span class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wide">
      <i class="fas fa-star mr-1"></i><span data-fr="Populaire" data-en="Popular">Populaire</span>
    </span>
    {% endif %}
  </div>

  <!-- Body -->
  <div class="p-5">
    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-wider mb-1">{{ p.get_type_produit_display }}</p>
    <h3 class="font-bold text-slate-900 dark:text-white text-sm leading-snug mb-2 line-clamp-2">{{ p.nom }}</h3>
    <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mb-4 line-clamp-3">{{ p.description|truncatechars:100 }}</p>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <p class="text-lg font-black text-blue-600 text-left">{{ p.prix_formatte }}</p>
      <a href="/boutique/{{ p.slug }}/payer/"
         class="inline-flex items-center justify-center self-start gap-1.5 px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-xl hover:bg-blue-700 transition-colors min-w-[132px]">
        <i class="fas fa-credit-card"></i>
        <span data-fr="Acheter" data-en="Buy">Acheter</span>
      </a>
    </div>
  </div>
</article>
